{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}DMDX - Вхід в систему{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/stylesheet.css'%}" type="text/css">
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    {# Після Bootstrap + stylesheet: жорстко фіксуємо ширину картки та лого (великий JPG ламає flex min-width) #}
    <style>
        .login-page .login-container {
            min-width: 0 !important;
            max-width: 400px !important;
            width: min(400px, calc(100vw - 2rem)) !important;
            box-sizing: border-box !important;
            flex: 0 1 auto !important;
        }
        .login-page .login-logo-frame {
            display: block;
            width: 100%;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }
        .login-page .login-logo-frame .login-logo-img {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            display: block !important;
            border-radius: 0 !important;
            box-sizing: border-box !important;
        }
        @media (max-width: 768px) {
            .login-page .login-logo-frame { max-width: 240px; }
        }
        @media (max-width: 480px) {
            .login-page .login-logo-frame { max-width: 220px; }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon" aria-hidden="true">📦</div>
            <div class="login-logo-frame">
                <img src="{% static 'images/logo DDX.jpg' %}" alt="DMDX" class="login-logo-img">
            </div>
        </div>
        
        <form method="POST" action="{% url 'login' %}" class="login-form">
            {% csrf_token %}
            
            <div class="form-floating">
                <input type="text" class="form-control" name="username" id="floatingInput" placeholder=" " autocomplete="username" required>
                <label for="floatingInput">Логін</label>
            </div>
            
            <div class="form-floating">
                <input type="password" class="form-control" name="password" id="floatingPassword" placeholder=" " autocomplete="current-password" required>
                <label for="floatingPassword">Пароль</label>
            </div>
            
            <button class="login-btn" type="submit">
                Увійти в систему
            </button>
        </form>
        
        <div class="login-footer">
            <p>© <span class="company-name">DMDX</span>, {% now "Y" %}</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
